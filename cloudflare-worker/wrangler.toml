name = "tuningdigital-subscribe"
main = "worker.js"
compatibility_date = "2026-06-04"

# Route this Worker at the subscribe paths only.
# Unsubscribe is handled via a Worker Custom Domain (unsub.tuningdigital.com)
# configured in the dashboard, NOT via routes here — Custom Domains use a
# different internal CF mechanism that's more reliable than path-based Routes.
routes = [
  { pattern = "tuningdigital.com/api/subscribe", zone_name = "tuningdigital.com" },
  { pattern = "www.tuningdigital.com/api/subscribe", zone_name = "tuningdigital.com" },
]

# Observability — keep logs flowing in `wrangler tail`
[observability]
enabled = true

# Secrets to set BEFORE first deploy (one-time, per environment):
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put RESEND_AUDIENCE_ID
#   wrangler secret put UNSUBSCRIBE_SECRET   ← any random ≥32-char string,
#                                              used to sign unsubscribe URL tokens
#                                              so they can't be forged.
#
# To rotate any secret later, run the same command and paste a new value.
