<?xml version="1.0" encoding="UTF-8"?>
<!--
  Alex Bacsa — stylised placeholder portrait for the About page.
  Geometric abstract silhouette in brand colours (navy bg, cyan accent).
  Designed to be replaced later with a commissioned illustration or real
  photo. 200×200 viewBox, scales cleanly to any displayed size.

  The form: a generalised head silhouette overlaid on the tuning-dial
  motif from /assets/img/favicon.svg — ties the editor visually to the
  brand identity instead of trying to look like a stock-photo person.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#101736"/>
      <stop offset="100%" stop-color="#060812"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#00e5d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00e5d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  <circle cx="100" cy="110" r="80" fill="url(#glow)"/>

  <!-- Tuning-dial motif behind the silhouette (echoes the favicon) -->
  <g opacity="0.25" stroke="#00e5d4" fill="none">
    <circle cx="100" cy="100" r="78" stroke-width="1"/>
    <circle cx="100" cy="100" r="62" stroke-width="1"/>
  </g>
  <g opacity="0.55" stroke="#00e5d4" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="14" x2="100" y2="28"/>
    <line x1="100" y1="172" x2="100" y2="186"/>
    <line x1="14"  y1="100" x2="28"  y2="100"/>
    <line x1="172" y1="100" x2="186" y2="100"/>
  </g>

  <!-- Geometric head silhouette: stylised "person" without trying to look like anyone -->
  <g fill="none" stroke="#00e5d4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Skull/head outline (rounded square-ish dome) -->
    <path d="M 70 100 Q 70 65 100 65 Q 130 65 130 100 L 130 118 Q 130 130 122 134 L 118 136"/>
    <!-- Neck + shoulder line -->
    <path d="M 82 134 L 78 136 Q 70 140 64 150 Q 60 158 60 175"/>
    <path d="M 122 134 L 126 136 Q 140 144 140 160 Q 140 168 140 175"/>
  </g>

  <!-- Centre eye-line glyph (echoes the dial's centre dot — abstract not literal) -->
  <circle cx="100" cy="95" r="3" fill="#00e5d4"/>
  <circle cx="100" cy="95" r="9" fill="none" stroke="#00e5d4" stroke-width="1.5" opacity="0.55"/>
</svg>
