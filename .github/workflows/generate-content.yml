name: Generate Content (Twice-weekly)

on:
  schedule:
    # Monday + Thursday at 08:00 UTC. The post-to-x workflow's daily 10:00 UTC
    # schedule picks up these new articles ~2h later and posts each to X.
    - cron: '0 8 * * 1,4'
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      count:
        description: 'Number of articles to generate'
        required: false
        default: '2'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate article(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '2' }}"
          echo "Generating $COUNT article(s)..."
          node assets/js/content-engine.js batch $COUNT

      - name: Commit and push new articles
        run: |
          git config --local user.email "content-bot@tuningdigital.com"
          git config --local user.name "Tuning Digital Bot"
          # Stage modified AND untracked files in the engine's output paths.
          # The previous "git diff --name-only" check silently dropped untracked
          # (new) files — caused 2026-05-25 11:57 UTC run to generate articles
          # but never commit them. Now we stage first, then check the index.
          git add blog/*.html sitemap.xml feed.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️  No staged changes — engine produced nothing to commit"
            exit 0
          fi
          git commit -m "chore: auto-generate articles"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Content Generation Complete" >> $GITHUB_STEP_SUMMARY
          echo "New articles committed to /blog/" >> $GITHUB_STEP_SUMMARY
          echo "Sitemap updated." >> $GITHUB_STEP_SUMMARY
